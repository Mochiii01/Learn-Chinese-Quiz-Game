<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Well Do Your Friends Know You?</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f0f8ff;
    margin: 0;
    padding: 20px;
  }
  .quiz-container {
    background: white;
    max-width: 400px;
    margin: 50px auto;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
  }
  button {
    margin: 10px;
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
  }
  #score-display {
    font-weight: bold;
    font-size: 24px;
    margin: 20px;
  }
</style>
</head>
<body>

<h1>How Well Do Your Friends Know You?</h1>
<div class="quiz-container" id="container">
  <button id="startBtn">Start Quiz</button>
</div>

<script>
// 题目数据
const quizData = [
  { question: "What is my favorite color?", choices:["Red","Blue","Green","Yellow"], answer:"Blue" },
  { question: "Do I like waking up early?", choices:["Yes","No"], answer:"Yes" },
  { question: "Do I like drinking milk?", choices:["Yes","No"], answer:"Yes" },
  { question: "Do I like exercising?", choices:["Yes","No"], answer:"No" },
  { question: "Do I like sweets?", choices:["Yes","No"], answer:"Yes" },
  { question: "Do I prefer cats or dogs?", choices:["Cats","Dogs"], answer:"Dogs" },
  { question: "How much do I usually use my phone?", choices:["A lot","Moderate","Very little"], answer:"Moderate" },
  { question: "Do I prefer being alone or in a crowd?", choices:["Alone","In a crowd"], answer:"Alone" },
  { question: "What is my favorite fruit?", choices:["Apple","Banana","Orange","Grapes"], answer:"Apple" },
  { question: "Do I like coffee?", choices:["Yes","No"], answer:"No" }
];

let currentQuestion = 0;
let totalScore = 0;

// 确保 DOM 完全加载后绑定按钮
window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("startBtn").addEventListener("click", startQuiz);
});

// 开始测验
function startQuiz() {
  totalScore = 0;
  currentQuestion = 0;
  showQuestion();
}

// 显示题目
function showQuestion() {
  const q = quizData[currentQuestion];
  const container = document.getElementById("container");
  container.innerHTML = 
    <p>${q.question}</p>
    <div id="choices"></div>
    <button id="nextBtn" style="display:none;">Next</button>
  ;

  const choicesDiv = document.getElementById("choices");
  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.onclick = () => {
      if(choice === q.answer) totalScore++;
      document.getElementById("nextBtn").style.display = "inline-block";
    };
    choicesDiv.appendChild(btn);
  });

  document.getElementById("nextBtn").onclick = nextQuestion;
}

// 下一题
function nextQuestion() {
  currentQuestion++;
  if(currentQuestion < quizData.length){
    showQuestion();
  } else {
    showResult();
  }
}

// 显示结果
function showResult() {
  let color = totalScore <= 3 ? "red" : (totalScore <= 7 ? "orange" : "green");

  const container = document.getElementById("container");
  container.innerHTML = 
    <h2>Quiz Completed!</h2>
    <p id="score-display" style="color:${color}">${totalScore} / ${quizData.length} points</p>
    <button id="restartBtn">Return Home</button>
    <button id="selfBtn">Take it Myself</button>
  ;

  document.getElementById("restartBtn").addEventListener("click", restartQuiz);
  document.getElementById("selfBtn").addEventListener("click", startQuiz);
}

// 回到主页
function restartQuiz() {
  const container = document.getElementById("container");
  container.innerHTML = <button id="startBtn">Start Quiz</button>;
  document.getElementById("startBtn").addEventListener("click", startQuiz);
}
</script>

</body>
</html>
